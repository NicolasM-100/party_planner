{% extends "base.html" %}

{% block extra_head %}
<script>window.__EVENT_ID__ = {{ event_id }};</script>
{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="/">Dashboard</a></li>
    <li class="breadcrumb-item active" id="eventTitleBreadcrumb">Event</li>
  </ol>
</nav>

<div id="eventDetailPage" class="row g-3">
  <div class="col-12">
    <div class="card shadow-sm bento-card">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <h3 id="eventTitle" class="mb-1 placeholder-glow"><span class="placeholder col-6"></span></h3>
            <p id="eventMeta" class="text-muted small mb-0 placeholder-glow"><span class="placeholder col-8"></span></p>
          </div>
          <div class="dropdown">
            <button class="btn btn-outline-secondary btn-sm" data-bs-toggle="dropdown">
              <i data-lucide="more-vertical"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><button class="dropdown-item text-danger" id="deleteEventBtn"><i data-lucide="trash-2" class="me-2"></i>Delete</button></li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="col-lg-6">
    <div class="card shadow-sm bento-card h-100">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0"><i data-lucide="clock" class="text-primary me-2"></i>Timeline</h5>
        <button id="addTimelineBtn" class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" data-bs-target="#timelineModal" disabled>
          <i data-lucide="plus"></i>
        </button>
      </div>
      <div class="card-body placeholder-glow" id="timelineList">
        <div class="d-flex align-items-center gap-2 py-1">
          <span class="placeholder rounded-circle" style="width:18px;height:18px"></span>
          <span class="placeholder col-7" style="height:14px"></span>
          <span class="placeholder col-3 ms-auto" style="height:14px"></span>
        </div>
        <div class="d-flex align-items-center gap-2 py-1">
          <span class="placeholder rounded-circle" style="width:18px;height:18px"></span>
          <span class="placeholder col-8" style="height:14px"></span>
          <span class="placeholder col-2 ms-auto" style="height:14px"></span>
        </div>
        <div class="d-flex align-items-center gap-2 py-1">
          <span class="placeholder rounded-circle" style="width:18px;height:18px"></span>
          <span class="placeholder col-6" style="height:14px"></span>
          <span class="placeholder col-3 ms-auto" style="height:14px"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="col-lg-6">
    <div class="card shadow-sm bento-card h-100">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0"><i data-lucide="utensils" class="text-warning me-2"></i>Vendors</h5>
        <button id="addVendorBtn" class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" data-bs-target="#vendorModal" disabled>
          <i data-lucide="plus"></i>
        </button>
      </div>
      <div class="card-body placeholder-glow" id="vendorList">
        <div class="d-flex justify-content-between align-items-center py-1">
          <span class="placeholder col-5" style="height:14px"></span>
          <span class="placeholder col-3" style="height:14px"></span>
        </div>
        <div class="d-flex justify-content-between align-items-center py-1">
          <span class="placeholder col-4" style="height:14px"></span>
          <span class="placeholder col-4" style="height:14px"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="col-lg-6">
    <div class="card shadow-sm bento-card h-100">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0"><i data-lucide="dollar-sign" class="text-success me-2"></i>Budget</h5>
        <button id="addBudgetBtn" class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" data-bs-target="#budgetModal" disabled>
          <i data-lucide="plus"></i>
        </button>
      </div>
      <div class="card-body placeholder-glow" id="budgetList">
        <div class="mb-2">
          <div class="d-flex justify-content-between mb-1">
            <span class="placeholder col-4" style="height:14px"></span>
            <span class="placeholder col-3" style="height:14px"></span>
          </div>
          <span class="placeholder col-12" style="height:6px"></span>
        </div>
        <div class="mb-2">
          <div class="d-flex justify-content-between mb-1">
            <span class="placeholder col-5" style="height:14px"></span>
            <span class="placeholder col-3" style="height:14px"></span>
          </div>
          <span class="placeholder col-12" style="height:6px"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="col-lg-6">
    <div class="card shadow-sm bento-card h-100">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0"><i data-lucide="users" class="text-info me-2"></i>RSVPs</h5>
        <button id="addRSVPBtn" class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" data-bs-target="#rsvpModal" disabled>
          <i data-lucide="plus"></i>
        </button>
      </div>
      <div class="card-body placeholder-glow" id="rsvpList">
        <div class="d-flex justify-content-between align-items-center py-1">
          <span class="placeholder col-5" style="height:14px"></span>
          <span class="placeholder col-2" style="height:16px"></span>
        </div>
        <div class="d-flex justify-content-between align-items-center py-1">
          <span class="placeholder col-4" style="height:14px"></span>
          <span class="placeholder col-3" style="height:16px"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="col-12">
    <div class="card shadow-sm bento-card">
      <div class="card-header">
        <h5 class="mb-0"><i data-lucide="leaf" class="text-success me-2"></i>Sustainability Metrics</h5>
      </div>
      <div class="card-body placeholder-glow" id="sustainabilitySection">
        <div class="d-flex flex-wrap gap-3 py-1">
          <span class="placeholder col-3" style="height:14px"></span>
          <span class="placeholder col-3" style="height:14px"></span>
          <span class="placeholder col-3" style="height:14px"></span>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="timelineModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Add Timeline Item</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="timelineForm">
          <div class="mb-3">
            <label class="form-label">Title</label>
            <input name="title" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Date/Time</label>
            <input name="event_datetime" type="datetime-local" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Sort Order</label>
            <input name="sort_order" type="number" class="form-control" value="0">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button id="saveTimelineBtn" type="button" class="btn btn-primary">Add</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="vendorModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Add Vendor</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="vendorForm">
          <div class="mb-3">
            <label class="form-label">Name</label>
            <input name="name" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Category</label>
            <input name="category" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Contact</label>
            <input name="contact" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Cost ($)</label>
            <input name="cost" type="number" step="0.01" class="form-control">
          </div>
          <div class="form-check mb-3">
            <input name="eco_verified" type="checkbox" class="form-check-input" id="ecoCheck">
            <label class="form-check-label" for="ecoCheck">Eco-Verified</label>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button id="saveVendorBtn" type="button" class="btn btn-primary">Add</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="budgetModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Add Budget Item</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="budgetForm">
          <div class="mb-3">
            <label class="form-label">Category</label>
            <input name="category" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Allocated ($)</label>
            <input name="allocated" type="number" step="0.01" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Spent ($)</label>
            <input name="spent" type="number" step="0.01" class="form-control" value="0">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button id="saveBudgetBtn" type="button" class="btn btn-primary">Add</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="rsvpModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Add RSVP</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="rsvpForm">
          <div class="mb-3">
            <label class="form-label">Guest Name</label>
            <input name="guest_name" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input name="email" type="email" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Status</label>
            <select name="status" class="form-select">
              <option value="pending">Pending</option>
              <option value="confirmed">Confirmed</option>
              <option value="declined">Declined</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Plus Ones</label>
            <input name="plus_ones" type="number" class="form-control" value="0">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button id="saveRSVPBtn" type="button" class="btn btn-primary">Add</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
